name: CD — Chrome Web Store Deploy

on:
  push:
    branches: [main]
    paths:
      - 'manifest.json'
      - 'src/**'
      - '_locales/**'
      - 'assets/icons/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI passes
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Build zip
        run: |
          mkdir -p store-assets
          zip -r store-assets/skillbridge.zip manifest.json _locales/ src/ assets/icons/ -x '*.DS_Store'
          echo "✓ Built store-assets/skillbridge.zip"

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: store-assets/skillbridge.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillbridge-v${{ steps.version.outputs.version }}
          path: store-assets/skillbridge.zip
